<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Thực Đơn - Nhà Hàng</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						primary: {
							50: '#fef7ee',
							100: '#fdedd3',
							200: '#fad7a5',
							300: '#f6ba6d',
							400: '#f19333',
							500: '#ee7711',
							600: '#df5c08',
							700: '#b94309',
							800: '#93360f',
							900: '#772e0f'
						}
					}
				}
			}
		}
	</script>
</head>

<body class="bg-gray-50" x-data="pageData()">
	<!-- Navigation -->
	<nav class="bg-white/95 backdrop-blur-md shadow-sm border-b transition-all duration-300 py-4">
		<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
			<div class="flex justify-between items-center">
				<div class="flex items-center gap-3">
					<template x-if="info.logo_url">
						<img :src="info.logo_url" alt="Logo" class="h-10 w-auto">
					</template>
					<div x-show="!info.logo_url"
						class="w-10 h-10 bg-gradient-to-br from-primary-400 to-primary-600 rounded-xl flex items-center justify-center">
						<i class="fas fa-utensils text-white"></i>
					</div>
					<h1 class="text-xl font-bold text-gray-800" x-text="info.name || 'Nhà Hàng'"></h1>
				</div>

				<!-- Desktop Menu -->
				<div class="hidden md:flex items-center space-x-8">
					<a href="/" class="text-gray-700 hover:text-primary-600 font-medium py-2 transition">Trang
						chủ</a>
					<a x-show="info.show_menu" href="/menu"
						class="text-gray-700 hover:text-primary-600 font-medium py-2 transition">Thực
						đơn</a>
					<a x-show="info.show_gallery" href="#gallery"
						class="text-gray-700 hover:text-primary-600 font-medium py-2 transition">Hình
						ảnh</a>
					<a href="/blog" class="text-gray-700 hover:text-primary-600 font-medium py-2 transition">Blog</a>
					<a href="#contact" class="text-gray-700 hover:text-primary-600 font-medium py-2 transition">Liên
						hệ</a>
					<a href="#booking"
						class="px-5 py-2 bg-primary-500 text-white rounded-full font-medium hover:bg-primary-600 transition shadow-lg shadow-primary-500/30">
						<i class="fas fa-calendar-check mr-2"></i><span>Đặt bàn</span>
					</a>
				</div>

				<!-- Mobile Menu Button -->
				<button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 text-gray-600 hover:text-primary-500">
					<i class="fas fa-bars text-xl"></i>
				</button>
			</div>

			<!-- Mobile Menu -->
			<div x-show="mobileMenu" x-transition class="md:hidden mt-4 pb-4 border-t border-gray-100 pt-4">
				<div class="flex flex-col space-y-3">
					<a href="/" @click="mobileMenu = false"
						class="text-gray-700 hover:text-primary-600 font-medium py-2">Trang chủ</a>
					<a x-show="info.show_menu" href="/menu" @click="mobileMenu = false"
						class="text-gray-700 hover:text-primary-600 font-medium py-2">Thực đơn</a>
					<a x-show="info.show_gallery" href="#gallery" @click="mobileMenu = false"
						class="text-gray-700 hover:text-primary-600 font-medium py-2">Hình ảnh</a>
					<a href="/blog" @click="mobileMenu = false"
						class="text-gray-700 hover:text-primary-600 font-medium py-2">Blog</a>
					<a href="#contact" @click="mobileMenu = false"
						class="text-gray-700 hover:text-primary-600 font-medium py-2">Liên hệ</a>
					<a href="#booking" @click="mobileMenu = false" class="text-primary-600 font-medium py-2">Đặt bàn</a>
				</div>
			</div>
		</div>
	</nav>

	<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="menuApp()">
		<!-- Menu List -->
		<div x-show="!selectedItem" x-transition>
			<h1 class="text-3xl font-bold text-gray-900 mb-8">Thực Đơn</h1>

			<!-- Categories Filter -->
			<div class="mb-6">
				<div class="flex flex-wrap gap-2">
					<button @click="selectedCategory = null"
						:class="selectedCategory === null ? 'bg-primary-600 text-white' : 'bg-gray-200 text-gray-700'"
						class="px-4 py-2 rounded-full text-sm font-medium">
						Tất cả
					</button>
					<template x-for="category in categories" :key="category">
						<button @click="selectedCategory = category"
							:class="selectedCategory === category ? 'bg-primary-600 text-white' : 'bg-gray-200 text-gray-700'"
							class="px-4 py-2 rounded-full text-sm font-medium" x-text="category"></button>
					</template>
				</div>
			</div>

			<!-- Menu Grid -->
			<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
				<template x-for="item in filteredItems" :key="item.id">
					<div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow cursor-pointer"
						@click="selectItem(item)">
						<div class="aspect-w-16 aspect-h-9 bg-gray-200">
							<img :src="item.image_url || '/placeholder-food.jpg'" :alt="item.name"
								class="w-full h-48 object-cover">
						</div>
						<div class="p-4">
							<h3 class="text-lg font-semibold text-gray-900 mb-2" x-text="item.name"></h3>
							<p class="text-gray-600 text-sm mb-2" x-text="item.description"></p>
							<!-- Rating Display -->
							<div x-show="item.averageRating > 0" class="flex items-center mb-2">
								<div class="flex text-yellow-400 mr-1">
									<template x-for="i in 5" :key="i">
										<i
											:class="i <= Math.round(item.averageRating) ? 'fas fa-star' : 'far fa-star'"></i>
									</template>
								</div>
								<span class="text-xs text-gray-600"
									x-text="item.averageRating.toFixed(1) + ' (' + (item.reviewCount || 0) + ')'"></span>
							</div>
							<div class="flex justify-between items-center">
								<span class="text-primary-600 font-bold" x-text="formatPrice(item.price)"></span>
								<span class="text-xs text-gray-500" x-text="item.category"></span>
							</div>
						</div>
					</div>
				</template>
			</div>
		</div>

		<!-- Menu Detail -->
		<div x-show="selectedItem" x-transition>
			<div class="mb-4">
				<button @click="selectedItem = null" class="text-primary-600 hover:text-primary-700">
					<i class="fas fa-arrow-left mr-2"></i>Quay lại thực đơn
				</button>
			</div>

			<div class="bg-white rounded-lg shadow-md overflow-hidden">
				<div class="md:flex">
					<div class="md:w-1/2">
						<img :src="selectedItem.image_url || '/placeholder-food.jpg'" :alt="selectedItem.name"
							class="w-full h-64 md:h-full object-cover">
					</div>
					<div class="md:w-1/2 p-6">
						<h1 class="text-3xl font-bold text-gray-900 mb-4" x-text="selectedItem.name"></h1>
						<p class="text-gray-600 mb-4" x-text="selectedItem.description"></p>
						<div class="flex justify-between items-center mb-6">
							<span class="text-2xl font-bold text-primary-600"
								x-text="formatPrice(selectedItem.price)"></span>
							<span class="text-sm text-gray-500" x-text="selectedItem.category"></span>
						</div>

						<!-- Reviews Section -->
						<div class="border-t pt-6">
							<h3 class="text-xl font-semibold mb-4">Đánh giá món ăn</h3>

							<!-- Average Rating -->
							<div class="mb-4" x-show="reviews.length > 0">
								<div class="flex items-center mb-2">
									<div class="flex text-yellow-400 mr-2">
										<template x-for="i in 5" :key="i">
											<i :class="i <= averageRating ? 'fas fa-star' : 'far fa-star'"></i>
										</template>
									</div>
									<span class="text-gray-600"
										x-text="averageRating.toFixed(1) + ' / 5 (' + reviews.length + ' đánh giá)'"></span>
								</div>
							</div>

							<!-- Review Form -->
							<form @submit.prevent="submitReview" class="mb-6 p-4 bg-gray-50 rounded-lg">
								<h4 class="font-medium mb-3">Viết đánh giá</h4>
								<div class="mb-3">
									<label class="block text-sm font-medium text-gray-700 mb-1">Đánh giá</label>
									<div class="flex">
										<template x-for="i in 5" :key="i">
											<button type="button" @click="newReview.rating = i" class="text-2xl">
												<i
													:class="i <= newReview.rating ? 'fas fa-star text-yellow-400' : 'far fa-star text-gray-300'"></i>
											</button>
										</template>
									</div>
								</div>
								<div class="mb-3">
									<label class="block text-sm font-medium text-gray-700 mb-1">Tên của bạn</label>
									<input type="text" x-model="newReview.customer_name"
										class="w-full px-3 py-2 border border-gray-300 rounded-md"
										placeholder="Nhập tên...">
								</div>
								<div class="mb-3">
									<label class="block text-sm font-medium text-gray-700 mb-1">Nhận xét</label>
									<textarea x-model="newReview.review_text" rows="3"
										class="w-full px-3 py-2 border border-gray-300 rounded-md"
										placeholder="Viết nhận xét của bạn..."></textarea>
								</div>
								<button type="submit"
									class="bg-primary-600 text-white px-4 py-2 rounded-md hover:bg-primary-700"
									:disabled="!newReview.rating">
									Gửi đánh giá
								</button>
							</form>

							<!-- Reviews List -->
							<div x-show="reviews.length === 0" class="text-gray-500 text-center py-8">
								Chưa có đánh giá nào. Hãy là người đầu tiên đánh giá món ăn này!
							</div>
							<div x-show="reviews.length > 0" class="space-y-4">
								<template x-for="review in reviews" :key="review.id">
									<div class="border-b pb-4">
										<div class="flex justify-between items-start mb-2">
											<div>
												<div class="flex text-yellow-400">
													<template x-for="i in 5" :key="i">
														<i
															:class="i <= review.rating ? 'fas fa-star' : 'far fa-star'"></i>
													</template>
												</div>
												<span class="text-sm text-gray-600"
													x-text="review.customer_name"></span>
											</div>
											<span class="text-xs text-gray-500"
												x-text="formatDate(review.created_at)"></span>
										</div>
										<p class="text-gray-700" x-text="review.review_text"></p>
									</div>
								</template>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		function pageData() {
			return {
				info: {
					show_promotions: true,
					show_menu: true,
					show_gallery: true,
					show_reviews: true
				},
				mobileMenu: false,
				scrolled: false,

				async init() {
					await this.loadInfo();
				},

				async loadInfo() {
					try {
						const response = await fetch('/api/content/info');
						this.info = await response.json();

						// Update favicon if exists
						if (this.info.favicon_url) {
							const link = document.getElementById('dynamic-favicon') || document.querySelector("link[rel*='icon']");
							if (link) {
								link.href = this.info.favicon_url;
							}
						}

						// Update page title
						document.title = this.info.name ? `${this.info.name} - Thực đơn` : 'Thực đơn - Nhà Hàng';
					} catch (error) {
						console.error('Error loading info:', error);
					}
				}
			}
		}

		function menuApp() {
			return {
				items: [],
				categories: [],
				selectedCategory: null,
				selectedItem: null,
				reviews: [],
				newReview: {
					rating: 0,
					review_text: '',
					customer_name: ''
				},
				averageRating: 0,

				init() {
					this.loadMenuItems();
				},

				async loadMenuItems() {
					try {
						const response = await fetch('/api/menu');
						this.items = await response.json();
						this.categories = [...new Set(this.items.map(item => item.category).filter(Boolean))];

						// Load reviews for all items to calculate average ratings
						await this.loadAllReviews();
					} catch (error) {
						console.error('Error loading menu:', error);
					}
				},

				async loadAllReviews() {
					try {
						const reviewPromises = this.items.map(item =>
							fetch(`/api/menu/${item.id}/reviews`).then(res => res.json())
						);
						const allReviews = await Promise.all(reviewPromises);

						this.items.forEach((item, index) => {
							const reviews = allReviews[index];
							if (reviews && reviews.length > 0) {
								const sum = reviews.reduce((acc, review) => acc + review.rating, 0);
								item.averageRating = sum / reviews.length;
								item.reviewCount = reviews.length;
							} else {
								item.averageRating = 0;
								item.reviewCount = 0;
							}
						});
					} catch (error) {
						console.error('Error loading reviews:', error);
					}
				},

				get filteredItems() {
					if (!this.selectedCategory) return this.items;
					return this.items.filter(item => item.category === this.selectedCategory);
				},

				async selectItem(item) {
					this.selectedItem = item;
					await this.loadReviews(item.id);
					// Update URL
					history.pushState(null, '', `/menu/${item.id}`);
				},

				async loadReviews(menuItemId) {
					try {
						const response = await fetch(`/api/menu/${menuItemId}/reviews`);
						this.reviews = await response.json();
						this.calculateAverageRating();
					} catch (error) {
						console.error('Error loading reviews:', error);
					}
				},

				calculateAverageRating() {
					if (this.reviews.length === 0) {
						this.averageRating = 0;
						return;
					}
					const sum = this.reviews.reduce((acc, review) => acc + review.rating, 0);
					this.averageRating = sum / this.reviews.length;
				},

				async submitReview() {
					if (!this.newReview.rating) return;

					try {
						const response = await fetch(`/api/menu/${this.selectedItem.id}/reviews`, {
							method: 'POST',
							headers: {
								'Content-Type': 'application/json'
							},
							body: JSON.stringify(this.newReview)
						});

						if (response.ok) {
							await this.loadReviews(this.selectedItem.id);
							this.newReview = { rating: 0, review_text: '', customer_name: '' };
							alert('Cảm ơn bạn đã đánh giá! Đánh giá của bạn đang chờ được duyệt trước khi hiển thị.');
						} else {
							alert('Có lỗi xảy ra khi gửi đánh giá');
						}
					} catch (error) {
						console.error('Error submitting review:', error);
						alert('Có lỗi xảy ra khi gửi đánh giá');
					}
				},

				formatPrice(price) {
					return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(price);
				},

				formatDate(dateString) {
					return new Date(dateString).toLocaleDateString('vi-VN');
				}
			}
		}

		// Handle browser back button
		window.addEventListener('popstate', function () {
			location.reload();
		});
	</script>
</body>

</html>
